<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="coreGrad" x1="60" y1="60" x2="260" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="160" y1="80" x2="160" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>
    
    <!-- Filters for Glow Effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="25" result="blur" />
    </filter>
  </defs>

  <!-- Background Glowing Aura -->
  <circle cx="160" cy="160" r="80" fill="url(#glowGrad)" filter="url(#softGlow)" />

  <!-- Orbit Rings -->
  <ellipse cx="160" cy="160" rx="110" ry="45" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.3" transform="rotate(-15 160 160)" />
  <ellipse cx="160" cy="160" rx="130" ry="60" stroke="#06B6D4" stroke-width="1" opacity="0.2" transform="rotate(25 160 160)" />

  <!-- Orbiting Nodes (Background) -->
  <circle cx="60" cy="120" r="6" fill="#8B5CF6" opacity="0.6" filter="url(#glow)" />
  <circle cx="270" cy="190" r="4" fill="#06B6D4" opacity="0.5" />

  <!-- Core AI Floating Sphere -->
  <circle cx="160" cy="160" r="50" fill="url(#coreGrad)" filter="url(#glow)" />
  <circle cx="160" cy="160" r="46" stroke="#ffffff" stroke-width="1.5" opacity="0.25" />
  
  <!-- Outer Ring Shield -->
  <circle cx="160" cy="160" r="68" stroke="url(#coreGrad)" stroke-width="2" stroke-dasharray="40 15 10 15 5 15" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 160 160" to="360 160 160" dur="20s" repeatCount="indefinite" />
  </circle>

  <!-- Interactive Data Card 1 (Task/Schedule) -->
  <g transform="translate(30, 180)" opacity="0.95" filter="url(#glow)">
    <rect width="110" height="65" rx="12" fill="#1E1B4B" stroke="#4F46E5" stroke-width="1.5" />
    <!-- Mini Graph inside Card -->
    <path d="M15 45 Q35 25 55 40 T95 20" stroke="#06B6D4" stroke-width="2" stroke-linecap="round" fill="none" />
    <circle cx="95" cy="20" r="3" fill="#ffffff" />
    <circle cx="95" cy="20" r="5" stroke="#06B6D4" stroke-width="1.5" />
    
    <!-- Mini Dots for UI -->
    <rect x="12" y="12" width="25" height="6" rx="3" fill="#8B5CF6" />
    <circle cx="85" cy="15" r="2" fill="#4F46E5" />
    <circle cx="95" cy="15" r="2" fill="#4F46E5" />
  </g>

  <!-- Interactive Data Card 2 (AI Prompt Response) -->
  <g transform="translate(180, 50)" opacity="0.95" filter="url(#glow)">
    <rect width="110" height="70" rx="12" fill="#1E1B4B" stroke="#8B5CF6" stroke-width="1.5" />
    <!-- Skeleton text lines -->
    <rect x="12" y="15" width="40" height="6" rx="3" fill="#ffffff" opacity="0.8" />
    <rect x="12" y="28" width="85" height="4" rx="2" fill="#3730A3" />
    <rect x="12" y="38" width="70" height="4" rx="2" fill="#3730A3" />
    <rect x="12" y="48" width="80" height="4" rx="2" fill="#3730A3" />
    <!-- Accent pulse dot -->
    <circle cx="88" cy="17" r="3" fill="#10B981" />
  </g>

  <!-- Floating Sparkles / Stars -->
  <path d="M130 50 L132 55 L137 57 L132 59 L130 64 L128 59 L123 57 L128 55 Z" fill="#06B6D4" opacity="0.8" />
  <path d="M220 230 L221.5 233.5 L225 235 L221.5 236.5 L220 240 L218.5 236.5 L215 235 L218.5 233.5 Z" fill="#8B5CF6" opacity="0.8" />
  <path d="M80 80 L81 82.5 L83.5 83.5 L81 84.5 L80 87 L79 84.5 L76.5 83.5 L79 82.5 Z" fill="#ffffff" opacity="0.9" />
</svg>
