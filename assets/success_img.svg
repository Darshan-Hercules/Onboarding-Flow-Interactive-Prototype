<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="successGrad" x1="80" y1="80" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="bgGlow" x1="160" y1="80" x2="160" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="ultraGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="20" result="blur" />
    </filter>
  </defs>

  <!-- Glowing Aura Background -->
  <circle cx="160" cy="160" r="70" fill="url(#bgGlow)" filter="url(#ultraGlow)" />

  <!-- Circular Orbit/Ring Tracks -->
  <circle cx="160" cy="160" r="100" stroke="#06B6D4" stroke-width="1" stroke-dasharray="8 8" opacity="0.3" />
  <circle cx="160" cy="160" r="115" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.2" />

  <!-- Burst Rays -->
  <line x1="160" y1="30" x2="160" y2="45" stroke="#10B981" stroke-width="3" stroke-linecap="round" opacity="0.7" />
  <line x1="160" y1="275" x2="160" y2="290" stroke="#10B981" stroke-width="3" stroke-linecap="round" opacity="0.7" />
  <line x1="30" y1="160" x2="45" y2="160" stroke="#06B6D4" stroke-width="3" stroke-linecap="round" opacity="0.7" />
  <line x1="275" y1="160" x2="290" y2="160" stroke="#06B6D4" stroke-width="3" stroke-linecap="round" opacity="0.7" />
  
  <line x1="68" y1="68" x2="78" y2="78" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" opacity="0.7" />
  <line x1="242" y1="242" x2="252" y2="252" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" opacity="0.7" />
  <line x1="242" y1="68" x2="252" y2="78" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" opacity="0.7" />
  <line x1="68" y1="242" x2="78" y2="252" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" opacity="0.7" />

  <!-- Outer Hexagonal Check Shield -->
  <polygon points="160,75 233,117 233,202 160,245 87,202 87,117" fill="#1E1B4B" stroke="url(#successGrad)" stroke-width="2.5" filter="url(#glow)" />
  
  <!-- Nested Hexagon detailing -->
  <polygon points="160,88 221,123 221,196 160,231 99,196 99,123" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15" />

  <!-- Success Checkmark (Vibrant Check) -->
  <path d="M125 160 L148 183 L198 133" stroke="url(#successGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <path d="M125 160 L148 183 L198 133" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />

  <!-- Glowing particles/shapes -->
  <!-- Diamonds -->
  <path d="M75 125 L78 130 L75 135 L72 130 Z" fill="#06B6D4" />
  <path d="M245 125 L248 130 L245 135 L242 130 Z" fill="#8B5CF6" />
  <!-- Circles -->
  <circle cx="115" cy="70" r="3" fill="#10B981" />
  <circle cx="215" cy="250" r="4" fill="#3B82F6" />
  <circle cx="100" cy="240" r="3.5" fill="#8B5CF6" />
  <circle cx="215" cy="75" r="3" fill="#ffffff" />
</svg>
